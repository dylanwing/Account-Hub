<html lang="en">

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0b0f1a;
            color: #f0f4ff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            padding: 24px;
            line-height: 1.6;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            margin-bottom: 32px;
        }

        h1 {
            font-size: 32px;
            margin-bottom: 8px;
            color: #f0f4ff;
        }

        .subtitle {
            font-size: 14px;
            color: #a0afc9;
            margin-bottom: 24px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 32px;
        }

        .stat-card {
            background-color: #1a2235;
            border: 1px solid #1e2d42;
            border-radius: 8px;
            padding: 16px;
        }

        .stat-label {
            font-size: 12px;
            color: #a0afc9;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 28px;
            font-weight: 600;
            color: #3b82f6;
        }

        .stat-subtext {
            font-size: 12px;
            color: #7a8ba8;
            margin-top: 8px;
        }

        .controls {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            flex-wrap: wrap;
            align-items: center;
        }

        .filter-group {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .filter-label {
            font-size: 12px;
            color: #a0afc9;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .filter-btn {
            background-color: #1a2235;
            border: 1px solid #1e2d42;
            color: #f0f4ff;
            padding: 8px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 500;
            transition: all 0.2s ease;
        }

        .filter-btn:hover {
            background-color: #253849;
            border-color: #3b82f6;
        }

        .filter-btn.active {
            background-color: #3b82f6;
            border-color: #3b82f6;
            color: #fff;
        }

        .heatmap-wrapper {
            background-color: #1a2235;
            border: 1px solid #1e2d42;
            border-radius: 8px;
            overflow: auto;
            margin-bottom: 32px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        thead {
            position: sticky;
            top: 0;
            background-color: #0f1824;
            z-index: 10;
        }

        th {
            padding: 12px 8px;
            text-align: left;
            border-bottom: 1px solid #1e2d42;
            color: #a0afc9;
            font-weight: 600;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            background-color: #0f1824;
        }

        th.account-col {
            position: sticky;
            left: 0;
            background-color: #0f1824;
            min-width: 200px;
            z-index: 11;
        }

        td {
            padding: 12px 8px;
            border-bottom: 1px solid #1e2d42;
            text-align: center;
            cursor: pointer;
            user-select: none;
            transition: all 0.2s ease;
        }

        td.account-cell {
            position: sticky;
            left: 0;
            background-color: #1a2235;
            text-align: left;
            z-index: 9;
            font-weight: 500;
            min-width: 200px;
            padding-left: 12px;
        }

        td.tier-header {
            position: sticky;
            left: 0;
            background-color: #0f1824;
            z-index: 9;
            border-bottom: 2px solid #1e2d42;
            font-weight: 600;
            color: #3b82f6;
            text-transform: uppercase;
            font-size: 11px;
        }

        .cell-empty {
            background-color: #1a2235;
        }

        .cell-missing {
            background-color: #4b5563;
            color: #d0d8e8;
        }

        .cell-partial {
            background-color: #f59e0b;
            color: #1a1f2e;
            font-weight: 600;
        }

        .cell-complete {
            background-color: #10b981;
            color: #fff;
            font-weight: 600;
        }

        td:hover:not(.account-cell):not(.tier-header) {
            opacity: 0.8;
            transform: scale(1.02);
        }

        .progress-container {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 8px;
        }

        .progress-bar {
            flex: 1;
            height: 6px;
            background-color: #0f1824;
            border-radius: 3px;
            overflow: hidden;
            min-width: 100px;
        }

        .progress-fill {
            height: 100%;
            background-color: #3b82f6;
            border-radius: 3px;
            transition: width 0.3s ease;
        }

        .progress-text {
            font-size: 11px;
            color: #a0afc9;
            min-width: 35px;
            text-align: right;
        }

        .gaps-section {
            background-color: #1a2235;
            border: 1px solid #1e2d42;
            border-radius: 8px;
            padding: 24px;
            margin-bottom: 32px;

            background-color: #0f1824;
            border-left: 3px solid #f59e0b;
            padding: 12px 16px;
            margin-bottom: 12px;
            border-radius: 4px;

            color: #1a1f2e;
            font-size: 10px;
            font-weight: 700;
            padding: 4px 8px;

            color: #a0afc9;
            margin-bottom: 8px;
        }

            font-size: 12px;
            color: #7a8ba8;

        .legend {
            display: flex;
            gap: 16px;
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid #1e2d42;
            flex-wrap: wrap;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
        }

        .legend-box {

        }

            h1 {

            }

            }

                width: 100%;
            }

                padding: 8px 4px;
                font-size: 11px;
            }

        function getAllAccounts() {
            const accounts = [];
            accounts.push(...tierData.tier1.accounts.map(a => ({ ...a, tier: 'tier1' })));
            accounts.push(...tierData.tier2.accounts.map(a => ({ ...a, tier: 'tier2' })));

            accounts.push(...tierData.tier4.skip.map(a => ({ ...a, tier: 'tier4' })));
            return accounts;
        }

        function calculateStats() {
            const allAccounts = getAllAccounts();
            const total = allAccounts.length;

            let completeCount = 0;
            let assetCounts = {
                plan: 0,
                proofPoints: 0,
                brief: 0,
                email: 0,
                contactData: 0,
                callPrep: 0
            };

            allAccounts.forEach(account => {
                assetTypes.forEach(type => {
                    if (account[type] === true) {
                        assetCounts[type]++;
                    }
                });

                const filledAssets = assetTypes.filter(t => account[t] === true).length;
                const applicableAssets = assetTypes.filter(t => account[t] !== null).length;
                if (filledAssets === applicableAssets && applicableAssets > 0) {
                    completeCount++;
                }
            });

            const overallCoverage = total > 0 ? ((completeCount / total) * 100).toFixed(1) : 0;

            return {
                total,
                completeCount,
                overallCoverage,
                assetCounts
            };
        }

                    <div class="stat-label">Total Accounts</div>
                    <div class="stat-value">${stats.total}</div>
                    <div class="stat-subtext">${tierData.tier1.accounts.length} Tier 1 + ${tierData.tier2.accounts.length} Tier 2 + ${tierData.tier3.accounts.length} Tier 3 + ${tierData.tier4.watch.length + tierData.tier4.lightTouch.length + tierData.tier4.low.length + tierData.tier4.skip.length} Tier 4</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Overall Coverage</div>
                    <div class="stat-value">${stats.overallCoverage}%</div>
                    <div class="stat-subtext">${stats.completeCount} of ${stats.total} accounts fully covered</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Account Plans</div>
                    <div class="stat-value">${stats.assetCounts.plan}</div>
                    <div class="stat-subtext">${((stats.assetCounts.plan / stats.total) * 100).toFixed(0)}% coverage</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Proof Points</div>
                    <div class="stat-value">${stats.assetCounts.proofPoints}</div>
                    <div class="stat-subtext">${((stats.assetCounts.proofPoints / stats.total) * 100).toFixed(0)}% coverage</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Prospect Briefs</div>
                    <div class="stat-value">${stats.assetCounts.brief}</div>
                    <div class="stat-subtext">${((stats.assetCounts.brief / stats.total) * 100).toFixed(0)}% coverage</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Email Sequences</div>
                    <div class="stat-value">${stats.assetCounts.email}</div>
                    <div class="stat-subtext">${((stats.assetCounts.email / stats.total) * 100).toFixed(0)}% coverage</div>
                </div>
            `;
        }

        function renderTable() {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';

            // Tier 1
            appendTierHeader(tbody, 'Tier 1 - Strategic Growth', 'tier1');
            tierData.tier1.accounts.forEach(account => {
                appendAccountRow(tbody, account, 'tier1');
            });

            // Tier 2
            appendTierHeader(tbody, 'Tier 2 - Growth Prospects', 'tier2');
            tierData.tier2.accounts.forEach(account => {
                appendAccountRow(tbody, account, 'tier2');
            });

            // Tier 3
            appendTierHeader(tbody, 'Tier 3 - Emerging Opportunities', 'tier3');
            tierData.tier3.accounts.forEach(account => {
                appendAccountRow(tbody, account, 'tier3');
            });

            // Tier 4 - Watch
            appendTierHeader(tbody, 'Tier 4 - Watch (Priority)', 'tier4');
            tierData.tier4.watch.forEach(account => {
                appendAccountRow(tbody, account, 'tier4');
            });

            // Tier 4 - Light Touch
            appendSubTierHeader(tbody, 'Light Touch', 'tier4');
            tierData.tier4.lightTouch.forEach(account => {
                appendAccountRow(tbody, account, 'tier4');
            });

            // Tier 4 - Low
            appendSubTierHeader(tbody, 'Low Touch', 'tier4');
            tierData.tier4.low.forEach(account => {
                appendAccountRow(tbody, account, 'tier4');
            });

            // Tier 4 - Skip
            appendSubTierHeader(tbody, 'Skip', 'tier4');
            tierData.tier4.skip.forEach(account => {
                appendAccountRow(tbody, account, 'tier4');
            });

            renderGaps();
        }

        function appendTierHeader(tbody, tierName, tierId) {
            const tierAccounts = getTierAccounts(tierId);
            const coverage = calculateTierCoverage(tierAccounts);

            const row = document.createElement('tr');
            row.className = 'tier-header-row';

            let html = `<td class="tier-header" colspan="7">
                <div style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
                    <span>${tierName}</span>
                    <div class="progress-container" style="width: 300px;">
                        <div class="progress-bar">
                            <div class="progress-fill" style="width: ${coverage}%"></div>
                        </div>
                        <div class="progress-text">${coverage}%</div>
                    </div>
                </div>
            </td>`;

            row.innerHTML = html;
            tbody.appendChild(row);
        }

        function appendSubTierHeader(tbody, subTierName, tierId) {
            const row = document.createElement('tr');
            row.className = 'tier-header-row';
            row.innerHTML = `<td class="tier-header" colspan="7" style="padding-left: 24px; font-weight: 500; font-size: 12px;">${subTierName}</td>`;
            tbody.appendChild(row);
        }

        function appendAccountRow(tbody, account, tierId) {
            const row = document.createElement('tr');
            row.className = `account-row tier-${tierId}`;
            row.dataset.tier = tierId;

            let html = `<td class="account-cell">${account.name}</td>`;

            assetTypes.forEach(assetType => {
                const status = account[assetType];
                let cellClass = 'cell-empty';
                let cellText = '—';

                if (status === true) {
                    cellClass = 'cell-complete';
                    cellText = '✓';
                } else if (status === false) {
                    cellClass = 'cell-missing';
                    cellText = '✗';
                }

                html += `<td class="${cellClass}" data-asset="${assetType}" title="Click to toggle">${cellText}</td>`;
            });

            row.innerHTML = html;

            // Add click handlers for toggling
            const cells = row.querySelectorAll('td:not(.account-cell)');
            cells.forEach(cell => {
                cell.addEventListener('click', (e) => {
                    toggleCell(cell, account, e.target.dataset.asset);
                });
            });

            tbody.appendChild(row);
        }

        function toggleCell(cell, account, assetType) {
            const currentStatus = account[assetType];

            // Cycle through states: true -> false -> true
            if (currentStatus === true) {
                account[assetType] = false;
                cell.className = 'cell-missing';
                cell.textContent = '✗';
            } else if (currentStatus === false) {
                account[assetType] = true;
                cell.className = 'cell-complete';
                cell.textContent = '✓';
            }

            renderStats();
            renderGaps();
        }

        function getTierAccounts(tierId) {
            if (tierId === 'tier1') return tierData.tier1.accounts;
            if (tierId === 'tier2') return tierData.tier2.accounts;
            if (tierId === 'tier3') return tierData.tier3.accounts;
            if (tierId === 'tier4') {
                return [
                    ...tierData.tier4.watch,
                    ...tierData.tier4.lightTouch,
                    ...tierData.tier4.low,
                    ...tierData.tier4.skip
                ];
            }
            return [];
        }

        function calculateTierCoverage(accounts) {
            if (accounts.length === 0) return 0;

            let completeCount = 0;
            accounts.forEach(account => {
                const filledAssets = assetTypes.filter(t => account[t] === true).length;
                const applicableAssets = assetTypes.filter(t => account[t] !== null).length;
                if (filledAssets === applicableAssets && applicableAssets > 0) {
                    completeCount++;
                }
            });

            return Math.round((completeCount / accounts.length) * 100);
        }

        function renderGaps() {
            const gapsContainer = document.getElementById('gapsContainer');
            const gaps = identifyGaps();

            let html = '';
            gaps.forEach(gap => {
                html += `
                    <div class="gap-item">
                        <div class="gap-priority">${gap.priority}</div>
                        <div class="gap-title">${gap.title}</div>
                        <div class="gap-description">${gap.description}</div>
                        <div class="gap-accounts">${gap.accounts}</div>
                    </div>
                `;
            });

            gapsContainer.innerHTML = html;
        }

        function identifyGaps() {
            const gaps = [];

            // Tier 1 gaps
            const tier1Missing = tierData.tier1.accounts.filter(a => !a.brief || !a.email);
            if (tier1Missing.length > 0) {
                gaps.push({
                    priority: 'Critical',
                    title: 'Tier 1: Complete Asset Coverage',
                    description: 'These strategic accounts are missing prospect briefs and/or email sequences. These are high-value accounts that need full coverage.',
                    accounts: `${tier1Missing.length} accounts: ${tier1Missing.map(a => a.name).join(', ')}`
                });
            }

            // Tier 2 gaps
            const tier2Missing = tierData.tier2.accounts.filter(a => !a.email);
            if (tier2Missing.length > 0) {
                gaps.push({
                    priority: 'High',
                    title: 'Tier 2: Email Sequences Needed',
                    description: 'All Tier 2 growth prospects have briefs and account plans, but lack email sequences for nurturing outreach.',
                    accounts: `All ${tier2Missing.length} Tier 2 accounts need email sequences`
                });
            }

            // Tier 3 gaps
            const tier3Missing = tierData.tier3.accounts.filter(a => !a.proofPoints);
            if (tier3Missing.length > 0) {
                gaps.push({
                    priority: 'High',
                    title: 'Tier 3: Proof Points Missing',
                    description: 'Emerging opportunity accounts need proof points to strengthen messaging and buyer confidence.',
                    accounts: `All ${tier3Missing.length} Tier 3 accounts need proof points`
                });
            }

            // Tier 4 Watch gaps
            const tier4WatchMissingEmail = tierData.tier4.watch.filter(a => !a.email);
            if (tier4WatchMissingEmail.length > 0) {
                gaps.push({
                    priority: 'Medium',
                    title: 'Tier 4 (Watch): Email Sequences',
                    description: 'Watch priority accounts would benefit from email sequences for nurturing at scale.',
                    accounts: `${tier4WatchMissingEmail.length} Watch accounts need email sequences`
                });
            }

            // Contact Data and Call Prep (if needed)
            gaps.push({
                priority: 'Low',
                title: 'Future Enhancement: Contact Data & Call Prep',
                description: 'Consider building contact data and call prep assets as tertiary enhancements after primary gaps are closed.',
                accounts: 'Optional for all tiers'
            });

            return gaps;
        }

        function setupFilters() {
            const filterBtns = document.querySelectorAll('.filter-btn');
            filterBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    filterBtns.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');

                    const filter = btn.dataset.filter;
                    const rows = document.querySelectorAll('.account-row');

                    rows.forEach(row => {
                        if (filter === 'all') {
                            row.style.display = '';
                        } else {
                            row.style.display = row.dataset.tier === filter ? '' : 'none';
                        }
                    });

                    // Also toggle tier headers
                    const tierHeaders = document.querySelectorAll('.tier-header-row');
                    const subHeaders = document.querySelectorAll('td[style*="padding-left"]');

                    tierHeaders.forEach(header => {
                        header.style.display = filter === 'all' ? '' : 'none';
                    });
                });
            });
        }

        // Initialize on load
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
