                    funding: '$177M raised ($70M Series D)',
                    techStack: 'Large Plant Model, 150M+ labeled plant images, LaserWeeder fleet, real-time CV inference'
                },
                keyContacts: [
                    { name: 'Paul Mikesell', title: 'CEO & Founder', status: 'Tier 1' },
                    { name: 'VP of Machine Learning', title: 'VP ML', status: 'Tier 1' }
                ],
                whyAnyscale: [
                    'Ray Data processes the 150M+ labeled plant image dataset for Large Plant Model training',
                    'Ray Train enables distributed vision model training across GPU clusters for agricultural AI',
                    'Ray Serve handles real-time weed detection inference on LaserWeeder fleet at field speed'
                ],
                rayLibraries: [
                    'Ray Data (PRIMARY) - 150M+ labeled plant image dataset processing',
                    'Ray Train (PRIMARY) - Distributed Large Plant Model training across GPU clusters',
                    'Ray Serve (SECONDARY) - Real-time weed detection on LaserWeeder fleet'
                ],
                proofPoints: [
                    'Blue River Technology: 2.5x AV regression testing speedup (24h to 9.5h) - similar agricultural CV',
                    'Physical Intelligence: 2x faster research iteration with managed Ray',
                    'Bedrock Robotics: Training time reduced 12h to 2h, 40%+ cost savings'
                ],
                discoveryQuestions: [
                    'What does the Large Plant Model training pipeline look like on 150M+ images?',
                    'How is the training dataset growing each season, and how does that affect infrastructure?',
                    'Whats the model update cycle for the LaserWeeder fleet - how do you push new models to deployed units?',
                    'Are you running distributed training across multiple nodes, or single-node with large GPUs?',
                    'What fraction of labeled data comes from field deployment vs. manual annotation?'
                ],
                talkTracks: [
                    '150M+ labeled images is the exact scale where distributed training with Ray Train pays for itself immediately',
                    'The LaserWeeder fleet generates continuous training data - Ray Data automates the ingestion pipeline',
                    'Every growing season adds millions more images - your training infrastructure needs to scale with the dataset',
                    'Real-time weed detection at field speed requires optimized inference - Ray Serve autoscaling handles variable fleet loads',
                    'Blue River Technology uses similar agricultural CV architecture on Ray - proven in production'
                ],
                competitorHandling: [
                    { competitor: 'AWS SageMaker', handling: 'SageMaker lacks the data processing + training + serving integration that agricultural CV pipelines need - Ray provides the full stack' },
                    { competitor: 'Custom training infrastructure', handling: 'At 274 employees with a growing fleet, engineering time on custom infra slows model iteration - managed Ray lets ML team focus on plant science' }
                ],
                landmines: [
                    'Agricultural seasonality means training workloads are bursty - emphasize Ray autoscaling and cost efficiency',
                    'Field deployment adds edge inference complexity - clarify Ray Serve handles cloud-side model serving, not edge',
                    'Hardware team may be separate from ML team - make sure to engage the right stakeholders'
                ],
                openingHooks: [
                    'Training the Large Plant Model on 150M+ labeled images is a serious distributed CV challenge - Ray Data + Ray Train were built for this exact workload',
                    'Blue River Technology runs similar agricultural CV on Ray - 2.5x faster regression testing',
                    'Every season your dataset grows and training takes longer - managed Ray scales with you automatically'
                ],
                agenda: [
                    { time: '0:00-3:00', topic: 'Intro: Ray for large-scale agricultural computer vision' },
                    { time: '3:00-8:00', topic: 'Deep Dive: Large Plant Model training on 150M+ images' },
                    { time: '8:00-15:00', topic: 'Architecture: Ray Data (image pipeline) + Ray Train (distributed CV) + Ray Serve (fleet inference)' },
                    { time: '15:00-22:00', topic: 'Case Studies: Blue River (2.5x), Physical Intelligence (2x), Bedrock (40%)' },
                    { time: '22:00-27:00', topic: 'Fleet model update cycle and continuous training pipeline' },
                    { time: '27:00-30:00', topic: 'Next Steps: Dataset assessment + proof of concept' }
                ],
                customNotes: ''
            }
        };

        const DATA_VERSION = 'v2-q2-2026-retiered';

        function init() {
            const stored = localStorage.getItem(STORAGE_KEY);
            const storedVersion = localStorage.getItem(STORAGE_KEY + '_version');
            
            if (stored && storedVersion === DATA_VERSION) {
                try {
                    accounts = JSON.parse(stored);
                    // Merge any new default accounts that aren't in storage
                    Object.keys(defaultAccounts).forEach(key => {
                        if (!accounts[key]) {
                            accounts[key] = defaultAccounts[key];
                        }
                    });
                } catch (e) {
                    accounts = { ...defaultAccounts };
                }
            } else {
                // Version mismatch or no stored data - use defaults
                accounts = { ...defaultAccounts };
                localStorage.setItem(STORAGE_KEY + '_version', DATA_VERSION);
            }
            saveToStorage();
            setupSearchInput();
        }

        function setupSearchInput() {
            const input = document.getElementById('accountInput');
            input.addEventListener('input', (e) => {
                const query = e.target.value.toLowerCase();
                const suggestions = document.getElementById('suggestions');

                if (!query.trim()) {
                    suggestions.classList.remove('show');
                    return;
                }

                const filtered = Object.keys(accounts).filter(name =>
                    name.toLowerCase().includes(query)
                );

                if (filtered.length === 0) {
                    suggestions.classList.remove('show');
                    return;
                }

                suggestions.innerHTML = filtered
                    .map(name => `<div class="suggestion-item" onclick="selectAccount('${name}')">${name}</div>`)
                    .join('');
                suggestions.classList.add('show');
            });

            input.addEventListener('blur', () => {
                setTimeout(() => {
                    document.getElementById('suggestions').classList.remove('show');
                }, 200);
            });
        }

        function selectAccount(accountName) {
            document.getElementById('accountInput').value = accountName;
            document.getElementById('suggestions').classList.remove('show');
            renderPrepContent(accountName);
        }

        function renderPrepContent(accountName) {
            if (!accounts[accountName]) {
                document.getElementById('noSelection').classList.add('active');
                document.getElementById('prepContent').classList.remove('active');
                return;
            }

            document.getElementById('noSelection').classList.remove('active');
            document.getElementById('prepContent').classList.add('active');

            const account = accounts[accountName];
            const company = account.company;
            let html = `<div class="prep-container">`;

            // Company Header
            html += `<div class="company-header">
                <div class="header-item" onclick="editCompanyField('industry', '${accountName}')">
                    <div class="header-label">Industry</div>
                    <div class="header-value">${company.industry}</div>
                </div>
                <div class="header-item" onclick="editCompanyField('size', '${accountName}')">
                    <div class="header-label">Size</div>
                    <div class="header-value">${company.size}</div>
                </div>
                <div class="header-item" onclick="editCompanyField('hq', '${accountName}')">
                    <div class="header-label">Headquarters</div>
                    <div class="header-value">${company.hq}</div>
                </div>
                <div class="header-item" onclick="editCompanyField('funding', '${accountName}')">
                    <div class="header-label">Funding</div>
                    <div class="header-value">${company.funding}</div>
                </div>
                <div class="header-item" onclick="editCompanyField('techStack', '${accountName}')">
                    <div class="header-label">Tech Stack</div>
                    <div class="header-value">${company.techStack}</div>
                </div>
            </div>`;

            // Key Contacts
            html += `<div class="section">
                <div class="section-title">Key Contacts</div>
                <div class="contact-grid">`;

            account.keyContacts.forEach((contact, idx) => {
                html += `<div class="contact-card" onclick="editContact(${idx}, '${accountName}')">
                    <div class="contact-name">${contact.name}</div>
                    <div class="contact-detail">${contact.title}</div>
                    <span class="contact-status">${contact.status}</span>
                </div>`;
            });

            html += `</div></div>`;

            // Why Anyscale
            html += `<div class="section">
                <div class="section-title">Why Anyscale</div>
                <ul class="bullet-list">`;
            account.whyAnyscale.forEach((point, idx) => {
                html += `<li>
                    <span class="bullet-text" onclick="editBulletPoint('whyAnyscale', ${idx}, '${accountName}')">${point}</span>
                    <span class="bullet-remove" onclick="removeBulletPoint('whyAnyscale', ${idx}, '${accountName}')">×</span>
                </li>`;
            });
            html += `</ul>
                <div class="list-actions">
                    <button class="btn" onclick="addBulletPoint('whyAnyscale', '${accountName}')">+ Add Point</button>
                </div>
            </div>`;

            // Ray Libraries
            html += `<div class="section">
                <div class="section-title">Ray Libraries</div>
                <ul class="bullet-list">`;
            account.rayLibraries.forEach((lib, idx) => {
                html += `<li>
                    <span class="bullet-text" onclick="editBulletPoint('rayLibraries', ${idx}, '${accountName}')">${lib}</span>
                    <span class="bullet-remove" onclick="removeBulletPoint('rayLibraries', ${idx}, '${accountName}')">×</span>
                </li>`;
            });
            html += `</ul>
                <div class="list-actions">
                    <button class="btn" onclick="addBulletPoint('rayLibraries', '${accountName}')">+ Add Library</button>
                </div>
            </div>`;

            // Proof Points
            html += `<div class="section">
                <div class="section-title">Proof Points</div>
                <ul class="bullet-list">`;
            account.proofPoints.forEach((proof, idx) => {
                html += `<li>
                    <span class="bullet-text" onclick="editBulletPoint('proofPoints', ${idx}, '${accountName}')">${proof}</span>
                    <span class="bullet-remove" onclick="removeBulletPoint('proofPoints', ${idx}, '${accountName}')">×</span>
                </li>`;
            });
            html += `</ul>
                <div class="list-actions">
                    <button class="btn" onclick="addBulletPoint('proofPoints', '${accountName}')">+ Add Proof Point</button>
                </div>
            </div>`;

            // Discovery Questions
            html += `<div class="section">
                <div class="section-title">Discovery Questions</div>
                <ul class="bullet-list">`;
            account.discoveryQuestions.forEach((q, idx) => {
                html += `<li>
                    <span class="bullet-text" onclick="editBulletPoint('discoveryQuestions', ${idx}, '${accountName}')">${q}</span>
                    <span class="bullet-remove" onclick="removeBulletPoint('discoveryQuestions', ${idx}, '${accountName}')">×</span>
                </li>`;
            });
            html += `</ul>
                <div class="list-actions">
                    <button class="btn" onclick="addBulletPoint('discoveryQuestions', '${accountName}')">+ Add Question</button>
                </div>
            </div>`;

            // Talk Tracks
            html += `<div class="section">
                <div class="section-title">Talk Tracks</div>
                <ul class="bullet-list">`;
            account.talkTracks.forEach((track, idx) => {
                html += `<li>
                    <span class="bullet-text" onclick="editBulletPoint('talkTracks', ${idx}, '${accountName}')">${track}</span>
                    <span class="bullet-remove" onclick="removeBulletPoint('talkTracks', ${idx}, '${accountName}')">×</span>
                </li>`;
            });
            html += `</ul>
                <div class="list-actions">
                    <button class="btn" onclick="addBulletPoint('talkTracks', '${accountName}')">+ Add Talk Track</button>
                </div>
            </div>`;

            // Competitor Handling
            html += `<div class="section">
                <div class="section-title">Competitor Handling</div>`;
            account.competitorHandling.forEach((item, idx) => {
                html += `<div class="objection-item" onclick="editCompetitor(${idx}, '${accountName}')">
                    <div class="objection-label">Competitor</div>
                    <div class="objection-text">${item.competitor}</div>
                    <div class="objection-label">Handling</div>
                    <div class="objection-text">${item.handling}</div>
                </div>`;
            });
            html += `</div>`;

            // Landmines
            html += `<div class="section">
                <div class="section-title">Landmines</div>
                <ul class="bullet-list">`;
            account.landmines.forEach((landmine, idx) => {
                html += `<li>
                    <span class="bullet-text" onclick="editBulletPoint('landmines', ${idx}, '${accountName}')">${landmine}</span>
                    <span class="bullet-remove" onclick="removeBulletPoint('landmines', ${idx}, '${accountName}')">×</span>
                </li>`;
            });
            html += `</ul>
                <div class="list-actions">
                    <button class="btn" onclick="addBulletPoint('landmines', '${accountName}')">+ Add Landmine</button>
                </div>
            </div>`;

            // Opening Hooks
            html += `<div class="section">
                <div class="section-title">Opening Hooks</div>
                <ul class="bullet-list">`;
            account.openingHooks.forEach((hook, idx) => {
                html += `<li>
                    <span class="bullet-text" onclick="editBulletPoint('openingHooks', ${idx}, '${accountName}')">${hook}</span>
                    <span class="bullet-remove" onclick="removeBulletPoint('openingHooks', ${idx}, '${accountName}')">×</span>
                </li>`;
            });
            html += `</ul>
                <div class="list-actions">
                    <button class="btn" onclick="addBulletPoint('openingHooks', '${accountName}')">+ Add Hook</button>
                </div>
            </div>`;

            // Agenda
            html += `<div class="section">
                <div class="section-title">30-Minute Meeting Agenda</div>`;
            account.agenda.forEach((item, idx) => {
                html += `<div class="agenda-item" onclick="editAgendaItem(${idx}, '${accountName}')">
                    <span class="agenda-time">${item.time}</span>
                    <span class="agenda-topic">${item.topic}</span>
                </div>`;
            });
            html += `<div class="list-actions">
                    <button class="btn" onclick="addAgendaItem('${accountName}')">+ Add Agenda Item</button>
                </div>
            </div>`;

            // Custom Notes
            html += `<div class="custom-notes">
                <label class="custom-notes-label">Custom Notes</label>
                <textarea onchange="saveCustomNotes(this, '${accountName}')">${account.customNotes}</textarea>
            </div>`;

            // Copy Button
            html += `<div class="copy-button-container">
                <button class="copy-button" onclick="copyToClipboard('${accountName}')">Copy to Clipboard</button>
                <div class="copy-feedback" id="copyFeedback">Copied to clipboard!</div>
            </div>`;

            html += `</div>`;

            document.getElementById('prepContent').innerHTML = html;
        }

        function editCompanyField(field, accountName) {
            const newValue = prompt(`Edit ${field}:`, accounts[accountName].company[field]);
            if (newValue !== null) {
                accounts[accountName].company[field] = newValue;
                saveToStorage();
                renderPrepContent(accountName);
            }
        }

        function editContact(idx, accountName) {
            const contact = accounts[accountName].keyContacts[idx];
            const newName = prompt('Edit name:', contact.name);
            if (newName !== null) {
                contact.name = newName;
                const newTitle = prompt('Edit title:', contact.title);
                if (newTitle !== null) {
                    contact.title = newTitle;
                    const newStatus = prompt('Edit status:', contact.status);
                    if (newStatus !== null) {
                        contact.status = newStatus;
                        saveToStorage();
                        renderPrepContent(accountName);
                    }
                }
            }
        }

        function editBulletPoint(field, idx, accountName) {
            const newValue = prompt('Edit item:', accounts[accountName][field][idx]);
            if (newValue !== null) {
                accounts[accountName][field][idx] = newValue;
                saveToStorage();
                renderPrepContent(accountName);
            }
        }

        function removeBulletPoint(field, idx, accountName) {
            accounts[accountName][field].splice(idx, 1);
            saveToStorage();
            renderPrepContent(accountName);
        }

        function addBulletPoint(field, accountName) {
            const newItem = prompt(`Add new ${field.replace(/([A-Z])/g, ' $1').toLowerCase()}:`);
            if (newItem !== null && newItem.trim()) {
                accounts[accountName][field].push(newItem);
                saveToStorage();
                renderPrepContent(accountName);
            }
        }

        function editCompetitor(idx, accountName) {
            const comp = accounts[accountName].competitorHandling[idx];
            const newCompetitor = prompt('Edit competitor:', comp.competitor);
            if (newCompetitor !== null) {
                comp.competitor = newCompetitor;
                const newHandling = prompt('Edit handling:', comp.handling);
                if (newHandling !== null) {
                    comp.handling = newHandling;
                    saveToStorage();
                    renderPrepContent(accountName);
                }
            }
        }

        function editAgendaItem(idx, accountName) {
            const item = accounts[accountName].agenda[idx];
            const newTime = prompt('Edit time slot:', item.time);
            if (newTime !== null) {
                item.time = newTime;
                const newTopic = prompt('Edit topic:', item.topic);
                if (newTopic !== null) {
                    item.topic = newTopic;
                    saveToStorage();
                    renderPrepContent(accountName);
                }
            }
        }

        function addAgendaItem(accountName) {
            const time = prompt('Add time slot (e.g., 0:00-5:00):');
            if (time !== null && time.trim()) {
                const topic = prompt('Add topic:');
                if (topic !== null && topic.trim()) {
                    accounts[accountName].agenda.push({
                        time: time,
                        topic: topic
                    });
                    saveToStorage();
                    renderPrepContent(accountName);
                }
            }
        }

        function saveCustomNotes(textarea, accountName) {
            accounts[accountName].customNotes = textarea.value;
            saveToStorage();
        }

        function saveToStorage() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(accounts));
        }

        function showAddAccountForm() {
            const accountName = prompt('Enter new account name:');
            if (accountName && accountName.trim()) {
                if (accounts[accountName]) {
                    alert('Account already exists!');
                    return;
                }

                const newAccount = {
                    company: {
                        industry: '',
                        size: '',
                        hq: '',
                        funding: '',
                        techStack: ''
                    },
                    keyContacts: [{ name: '', title: '', status: 'New' }],
                    whyAnyscale: [''],
                    rayLibraries: [''],
                    proofPoints: [''],
                    discoveryQuestions: [''],
                    talkTracks: [''],
                    competitorHandling: [{ competitor: '', handling: '' }],
                    landmines: [''],
                    openingHooks: [''],
                    agenda: [
                        { time: '0:00-5:00', topic: 'Warm-up & Context' },
                        { time: '5:00-25:00', topic: 'Main Discussion' },
                        { time: '25:00-30:00', topic: 'Next Steps' }
                    ],
                    customNotes: ''
                };

                accounts[accountName] = newAccount;
                saveToStorage();
                selectAccount(accountName);
            }
        }

        function resetToDefaults() {
            if (confirm('Reset all accounts to default data? This will erase any custom changes.')) {
                accounts = { ...defaultAccounts };
                localStorage.setItem(STORAGE_KEY + '_version', DATA_VERSION);
                saveToStorage();
                document.getElementById('accountInput').value = '';
                document.getElementById('prepContent').innerHTML = '';
                document.getElementById('noSelection').classList.add('active');
                document.getElementById('prepContent').classList.remove('active');
            }
        }

        function copyToClipboard(accountName) {
            const accountData = accounts[accountName];

            let text = `CALL PREP BRIEFING: ${accountName}\n`;
            text += '='.repeat(50) + '\n\n';

            text += 'COMPANY OVERVIEW\n';
            text += '-'.repeat(30) + '\n';
            text += `Industry: ${accountData.company.industry}\n`;
            text += `Size: ${accountData.company.size}\n`;
            text += `Headquarters: ${accountData.company.hq}\n`;
            text += `Funding: ${accountData.company.funding}\n`;
            text += `Tech Stack: ${accountData.company.techStack}\n\n`;

            text += 'KEY CONTACTS\n';
            text += '-'.repeat(30) + '\n';
            accountData.keyContacts.forEach(contact => {
                text += `• ${contact.name}\n  Title: ${contact.title}\n  Status: ${contact.status}\n\n`;
            });

            text += 'WHY ANYSCALE\n';
            text += '-'.repeat(30) + '\n';
            accountData.whyAnyscale.forEach((point, i) => {
                text += `${i + 1}. ${point}\n\n`;
            });

            text += 'RAY LIBRARY FIT\n';
            text += '-'.repeat(30) + '\n';
            accountData.rayLibraries.forEach(lib => {
                text += `• ${lib}\n`;
            });
            text += '\n';

            text += 'RELEVANT PROOF POINTS\n';
            text += '-'.repeat(30) + '\n';
            accountData.proofPoints.forEach(proof => {
                text += `• ${proof}\n`;
            });
            text += '\n';

            text += 'DISCOVERY QUESTIONS\n';
            text += '-'.repeat(30) + '\n';
            accountData.discoveryQuestions.forEach((q, i) => {
                text += `${i + 1}. ${q}\n`;
            });
            text += '\n';

            text += 'TALK TRACKS\n';
            text += '-'.repeat(30) + '\n';
            accountData.talkTracks.forEach((track, i) => {
                text += `${i + 1}. ${track}\n`;
            });
            text += '\n';

            text += 'COMPETITOR HANDLING\n';
            text += '-'.repeat(30) + '\n';
            accountData.competitorHandling.forEach((item, i) => {
                text += `${i + 1}. Competitor: ${item.competitor}\n   Handling: ${item.handling}\n\n`;
            });

            text += 'LANDMINES\n';
            text += '-'.repeat(30) + '\n';
            accountData.landmines.forEach((landmine, i) => {
                text += `${i + 1}. ${landmine}\n`;
            });
            text += '\n';

            text += 'OPENING HOOKS\n';
            text += '-'.repeat(30) + '\n';
            accountData.openingHooks.forEach((hook, i) => {
                text += `${i + 1}. ${hook}\n`;
            });
            text += '\n';

            text += '30-MINUTE MEETING AGENDA\n';
            text += '-'.repeat(30) + '\n';
            accountData.agenda.forEach(item => {
                text += `${item.time}: ${item.topic}\n`;
            });

            if (accountData.customNotes) {
                text += '\nCUSTOM NOTES\n';
                text += '-'.repeat(30) + '\n';
                text += accountData.customNotes + '\n';
            }

            navigator.clipboard.writeText(text).then(() => {
                const feedback = document.getElementById('copyFeedback');
                feedback.classList.add('show');
                setTimeout(() => {
                    feedback.classList.remove('show');
                }, 2000);
            });
        }

        // Initialize on load
        init();
    </script>
</body>
</html>
