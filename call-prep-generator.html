<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Call Prep Generator - Anyscale Account Planning</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background-color: #0b0f1a;
            color: #f0f4ff;
            line-height: 1.6;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            margin-bottom: 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-left h1 {
            font-size: 32px;
            margin-bottom: 10px;
            color: #f0f4ff;
        }

        .subtitle {
            color: #a0afc0;
            font-size: 16px;
        }

        .header-buttons {
            display: flex;
            gap: 12px;
        }

        .btn {
            padding: 10px 16px;
            border-radius: 8px;
            border: 1px solid #1e2d42;
            background-color: #1a2235;
            color: #f0f4ff;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.2s ease;
        }

        .btn:hover {
            background-color: #252f42;
            border-color: #3b82f6;
        }

        .btn-primary {
            background-color: #3b82f6;
            border-color: #3b82f6;
        }

        .btn-primary:hover {
            background-color: #2563eb;
        }

        .btn-danger {
            color: #ff6b6b;
            border-color: #ff6b6b;
        }

        .btn-danger:hover {
            background-color: rgba(255, 107, 107, 0.1);
        }

        .selector-section {
            margin-bottom: 40px;
            display: flex;
            gap: 16px;
            align-items: flex-end;
        }

        .form-group {
            flex: 1;
        }

        label {
            display: block;
            margin-bottom: 12px;
            font-size: 14px;
            font-weight: 600;
            color: #3b82f6;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .search-container {
            position: relative;
            width: 100%;
        }

        input[type="text"],
        textarea,
        select {
            width: 100%;
            padding: 12px 16px;
            background-color: #1a2235;
            border: 1px solid #1e2d42;
            border-radius: 8px;
            color: #f0f4ff;
            font-size: 14px;
            font-family: inherit;
            transition: all 0.2s ease;
        }

        input[type="text"]::placeholder,
        textarea::placeholder {
            color: #5a6a80;
        }

        input[type="text"]:focus,
        textarea:focus,
        select:focus {
            outline: none;
            border-color: #3b82f6;
            background-color: #1e2d42;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        .suggestions {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background-color: #1a2235;
            border: 1px solid #1e2d42;
            border-top: none;
            border-radius: 0 0 8px 8px;
            max-height: 300px;
            overflow-y: auto;
            z-index: 1000;
            display: none;
        }

        .suggestions.show {
            display: block;
        }

        .suggestion-item {
            padding: 12px 16px;
            cursor: pointer;
            transition: background-color 0.2s ease;
            font-size: 14px;
        }

        .suggestion-item:hover {
            background-color: #252f42;
        }

        .suggestion-item.selected {
            background-color: #3b82f6;
            color: #f0f4ff;
        }

        .prep-section {
            display: none;
        }

        .prep-section.active {
            display: block;
        }

        .prep-container {
            background-color: #1a2235;
            border: 1px solid #1e2d42;
            border-radius: 12px;
            padding: 32px;
            margin-bottom: 20px;
        }

        .company-header {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 40px;
            padding-bottom: 30px;
            border-bottom: 1px solid #1e2d42;
        }

        .header-item {
            display: flex;
            flex-direction: column;
            cursor: pointer;
            padding: 8px;
            border-radius: 6px;
            transition: background-color 0.2s;
        }

        .header-item:hover {
            background-color: rgba(59, 130, 246, 0.05);
        }

        .header-item.editing {
            background-color: rgba(59, 130, 246, 0.1);
        }

        .header-item input {
            margin-top: 4px;
        }

        .header-label {
            font-size: 12px;
            font-weight: 600;
            color: #3b82f6;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .header-value {
            font-size: 16px;
            color: #f0f4ff;
        }

        .section {
            margin-bottom: 40px;
        }

        .section-title {
            font-size: 18px;
            font-weight: 700;
            color: #3b82f6;
            margin-bottom: 16px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            cursor: pointer;
            padding: 8px;
            border-radius: 6px;
            transition: background-color 0.2s;
        }

        .section-title:hover {
            background-color: rgba(59, 130, 246, 0.05);
        }

        .section-content {
            cursor: pointer;
            padding: 8px;
            border-radius: 6px;
            transition: background-color 0.2s;
        }

        .section-content:hover {
            background-color: rgba(59, 130, 246, 0.05);
        }

        .section-content.editing {
            background-color: rgba(59, 130, 246, 0.1);
        }

        .section-content textarea {
            width: 100%;
            margin-top: 8px;
        }

        .bullet-list {
            list-style: none;
            margin-left: 0;
        }

        .bullet-list li {
            padding-left: 24px;
            margin-bottom: 12px;
            position: relative;
            font-size: 14px;
            line-height: 1.7;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-right: 16px;
        }

        .bullet-list li:before {
            content: "•";
            position: absolute;
            left: 0;
            color: #3b82f6;
            font-weight: bold;
            font-size: 18px;
        }

        .bullet-text {
            flex: 1;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 4px;
            transition: background-color 0.2s;
        }

        .bullet-text:hover {
            background-color: rgba(59, 130, 246, 0.05);
        }

        .bullet-text.editing {
            background-color: rgba(59, 130, 246, 0.1);
        }

        .bullet-text input {
            width: 100%;
        }

        .bullet-remove {
            color: #ff6b6b;
            cursor: pointer;
            font-size: 18px;
            padding: 4px 8px;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .bullet-list li:hover .bullet-remove {
            opacity: 1;
        }

        .list-actions {
            display: flex;
            gap: 8px;
            margin-top: 16px;
        }

        .contact-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 16px;
            margin-bottom: 20px;
        }

        .contact-card {
            background-color: #0b0f1a;
            border: 1px solid #1e2d42;
            border-radius: 8px;
            padding: 16px;
            font-size: 13px;
        }

        .contact-name {
            font-weight: 600;
            color: #f0f4ff;
            margin-bottom: 4px;
            cursor: pointer;
        }

        .contact-name:hover {
            color: #3b82f6;
        }

        .contact-detail {
            color: #a0afc0;
            margin-bottom: 2px;
            font-size: 12px;
        }

        .contact-status {
            display: inline-block;
            margin-top: 8px;
            padding: 4px 8px;
            border-radius: 4px;
            background-color: rgba(59, 130, 246, 0.1);
            color: #3b82f6;
            font-size: 11px;
            font-weight: 500;
        }

        .objection-item {
            background-color: #0b0f1a;
            border: 1px solid #1e2d42;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 16px;
            cursor: pointer;
            transition: border-color 0.2s;
        }

        .objection-item:hover {
            border-color: #3b82f6;
        }

        .objection-item.editing {
            border-color: #3b82f6;
            background-color: rgba(59, 130, 246, 0.05);
        }

        .objection-label {
            font-size: 12px;
            font-weight: 600;
            color: #3b82f6;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .objection-text {
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 12px;
            word-break: break-word;
        }

        .agenda-item {
            background-color: #0b0f1a;
            border: 1px solid #1e2d42;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: border-color 0.2s;
        }

        .agenda-item:hover {
            border-color: #3b82f6;
        }

        .agenda-item.editing {
            border-color: #3b82f6;
            background-color: rgba(59, 130, 246, 0.05);
        }

        .agenda-time {
            font-weight: 600;
            color: #3b82f6;
            min-width: 80px;
            font-size: 14px;
        }

        .agenda-topic {
            flex: 1;
            margin-left: 16px;
            color: #f0f4ff;
            font-size: 14px;
        }

        .copy-button-container {
            text-align: center;
            margin-top: 40px;
            position: relative;
        }

        .copy-button {
            padding: 12px 24px;
            background-color: #3b82f6;
            border: none;
            border-radius: 8px;
            color: #f0f4ff;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        .copy-button:hover {
            background-color: #2563eb;
            transform: translateY(-2px);
        }

        .copy-feedback {
            position: absolute;
            top: 50px;
            left: 50%;
            transform: translateX(-50%);
            background-color: #3b82f6;
            color: #f0f4ff;
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 13px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease;
        }

        .copy-feedback.show {
            opacity: 1;
        }

        .custom-notes {
            margin-top: 40px;
            padding-top: 40px;
            border-top: 1px solid #1e2d42;
        }

        .custom-notes-label {
            font-size: 14px;
            font-weight: 600;
            color: #3b82f6;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
            display: block;
        }

        .custom-notes textarea {
            width: 100%;
            min-height: 120px;
            padding: 12px 16px;
            background-color: #0b0f1a;
            border: 1px solid #1e2d42;
        }

        .no-selection {
            text-align: center;
            padding: 60px 20px;
            color: #5a6a80;
        }

        .no-selection.active {
            display: block;
        }

        .no-selection {
            display: none;
        }

        .add-account-container {
            margin-bottom: 40px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 16px;
        }

        @media (max-width: 768px) {
            .company-header {
                grid-template-columns: 1fr;
            }

            .form-row {
                grid-template-columns: 1fr;
            }

            .selector-section {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="header-left">
                <h1>Call Prep Generator</h1>
                <p class="subtitle">Account planning for Anyscale</p>
            </div>
            <div class="header-buttons">
                <button class="btn btn-danger" onclick="resetToDefaults()">Reset to Defaults</button>
                <button class="btn btn-primary" onclick="showAddAccountForm()">+ Add Account</button>
            </div>
        </header>

        <div class="selector-section">
            <div class="form-group">
                <label for="accountSelect">Select Account</label>
                <div class="search-container">
                    <input
                        type="text"
                        id="accountInput"
                        placeholder="Type account name..."
                        autocomplete="off"
                    />
                    <div class="suggestions" id="suggestions"></div>
                </div>
            </div>
        </div>

        <div class="no-selection active" id="noSelection">
            <p style="font-size: 18px; margin-bottom: 20px;">Select or create an account to get started</p>
            <p style="color: #3b82f6; font-size: 14px;">Use the search above to find an account, or click "+ Add Account" to create a new one</p>
        </div>

        <div class="prep-section active" id="prepContent"></div>
    </div>

    <script>
        let accounts = {};
        const STORAGE_KEY = 'callPrepAccounts';

        // Default accounts data
        const defaultAccounts = {
            'Scale AI': {
                company: {
                    industry: 'AI/ML Infrastructure',
                    size: '100-250 employees',
                    hq: 'San Francisco, CA',
                    funding: '$316M (Series D)',
                    techStack: 'PyTorch, CUDA, Apache Airflow, Kubernetes'
                },
                keyContacts: [
                    { name: 'Alexandr Wang', title: 'CEO & Co-founder', status: 'Warm' },
                    { name: 'Riley Durkin', title: 'COO', status: 'Contacted' }
                ],
                whyAnyscale: [
                    'Ray Tune for hyperparameter optimization of data collection workflows',
                    'Ray Serve for serving multiple ML models at scale',
                    'Ray Data for distributed data preprocessing and augmentation'
                ],
                rayLibraries: [
                    'Ray Tune - Optimizing data labeling workflows',
                    'Ray Serve - Serving multiple annotation models',
                    'Ray Data - Distributed data processing'
                ],
                proofPoints: [
                    'Scale AI uses Ray for distributed ML pipeline orchestration',
                    'Ray adoption reduces time to scale data pipelines by 40%',
                    'OpenAI uses Ray for large-scale model training'
                ],
                discoveryQuestions: [
                    'How do you currently optimize your data labeling pipelines?',
                    'What are your infrastructure bottlenecks for distributed processing?',
                    'How do you manage cost and resource allocation across different annotation models?',
                    'What is your current approach to hyperparameter tuning?'
                ],
                objections: [
                    {
                        objection: 'We already use Airflow for orchestration',
                        response: 'Ray complements Airflow by handling fine-grained parallelism and dynamic workflows. Many teams use both together—Airflow for DAG scheduling, Ray for in-task parallelism.'
                    },
                    {
                        objection: 'We\'re concerned about learning curve',
                        response: 'Ray has excellent documentation and we offer training support. Many companies see productivity gains within 2-3 weeks of adoption.'
                    }
                ],
                agenda: [
                    { time: '0:00-2:00', topic: 'Warm-up & Context' },
                    { time: '2:00-8:00', topic: 'Deep Dive: Current ML Pipelines' },
                    { time: '8:00-15:00', topic: 'Ray Use Cases & Architecture Demo' },
                    { time: '15:00-25:00', topic: 'Q&A and Proof of Concept Discussion' },
                    { time: '25:00-30:00', topic: 'Next Steps & Closing' }
                ],
                customNotes: ''
            },
            'Waymo': {
                company: {
                    industry: 'Autonomous Vehicles',
                    size: '1000+ employees',
                    hq: 'Mountain View, CA',
                    funding: 'Public (Alphabet subsidiary)',
                    techStack: 'Simulation, LIDAR, Python, C++'
                },
                keyContacts: [
                    { name: 'John Krafcik', title: 'Former CEO', status: 'Not engaged' },
                    { name: 'Tekedra Mawakana', title: 'CEO', status: 'Research' }
                ],
                whyAnyscale: [
                    'Ray for distributing simulation across GPU clusters',
                    'Ray Tune - Training models on synthetic data at scale',
                    'Ray Tune - Optimizing simulation parameters for better dataset diversity'
                ],
                rayLibraries: [
                    'Ray Tune - Training models on synthetic data at scale',
                    'Ray Serve - Serving multiple AV perception models',
                    'Ray - Distributed simulation orchestration'
                ],
                proofPoints: [
                    'Waymo uses synthetic data at scale for AV model training (industry standard)',
                    'Scale AI reduced synthetic data generation costs by 3x using distributed simulation',
                    'Aurora Technology generates millions of miles of synthetic driving data daily'
                ],
                discoveryQuestions: [
                    'How are you currently scaling synthetic data generation, and what are the compute cost drivers?',
                    'What simulation tools do you use, and how do you orchestrate them across infrastructure?',
                    'How do you ensure quality and diversity in synthetic datasets?',
                    'What is your current cost per synthetic mile or training sample?'
                ],
                objections: [
                    {
                        objection: 'We\'ve built our own in-house simulation framework',
                        response: 'We understand. Ray can integrate with custom simulators to handle the distributed orchestration and resource management, saving you engineering time.'
                    },
                    {
                        objection: 'Simulation is not a bottleneck for us',
                        response: 'That\'s great! Still, as you scale further, Ray can help optimize resource utilization and reduce infrastructure costs significantly.'
                    }
                ],
                agenda: [
                    { time: '0:00-3:00', topic: 'Warm-up & Recent AV Developments' },
                    { time: '3:00-10:00', topic: 'Deep Dive: Simulation & Synthetic Data Strategy' },
                    { time: '10:00-20:00', topic: 'Ray for Distributed Simulation Demo' },
                    { time: '20:00-27:00', topic: 'Integration & Cost Analysis Discussion' },
                    { time: '27:00-30:00', topic: 'Next Steps & Closing' }
                ],
                customNotes: ''
            }
        };

        // Initialize
        function init() {
            loadFromStorage();
            setupEventListeners();
        }

        function loadFromStorage() {
            const stored = localStorage.getItem(STORAGE_KEY);
            if (stored) {
                try {
                    accounts = JSON.parse(stored);
                } catch (e) {
                    accounts = { ...defaultAccounts };
                }
            } else {
                accounts = { ...defaultAccounts };
            }
        }

        function saveToStorage() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(accounts));
        }

        function setupEventListeners() {
            const input = document.getElementById('accountInput');
            const suggestions = document.getElementById('suggestions');

            input.addEventListener('input', (e) => {
                const value = e.target.value.trim().toLowerCase();
                suggestions.innerHTML = '';

                if (!value) {
                    suggestions.classList.remove('show');
                    return;
                }

                const matches = Object.keys(accounts).filter(name =>
                    name.toLowerCase().includes(value)
                );

                if (matches.length === 0) {
                    suggestions.classList.remove('show');
                    return;
                }

                matches.forEach(match => {
                    const div = document.createElement('div');
                    div.className = 'suggestion-item';
                    div.textContent = match;
                    div.onclick = () => selectAccount(match);
                    suggestions.appendChild(div);
                });

                suggestions.classList.add('show');
            });

            document.addEventListener('click', (e) => {
                if (!e.target.closest('.search-container')) {
                    suggestions.classList.remove('show');
                }
            });
        }

        function selectAccount(accountName) {
            const input = document.getElementById('accountInput');
            input.value = accountName;
            document.getElementById('suggestions').classList.remove('show');
            renderPrepContent(accountName);
        }

        function renderPrepContent(accountName) {
            const accountData = accounts[accountName];
            if (!accountData) return;

            const prepContent = document.getElementById('prepContent');
            const noSelection = document.getElementById('noSelection');

            const html = `
                <div class="prep-container">
                    <div class="company-header">
                        <div class="header-item" onclick="editHeaderField(this, 'company.industry', '${accountName}')">
                            <span class="header-label">Industry</span>
                            <span class="header-value">${accountData.company.industry}</span>
                        </div>
                        <div class="header-item" onclick="editHeaderField(this, 'company.size', '${accountName}')">
                            <span class="header-label">Company Size</span>
                            <span class="header-value">${accountData.company.size}</span>
                        </div>
                        <div class="header-item" onclick="editHeaderField(this, 'company.hq', '${accountName}')">
                            <span class="header-label">Headquarters</span>
                            <span class="header-value">${accountData.company.hq}</span>
                        </div>
                        <div class="header-item" onclick="editHeaderField(this, 'company.funding', '${accountName}')">
                            <span class="header-label">Funding</span>
                            <span class="header-value">${accountData.company.funding}</span>
                        </div>
                        <div class="header-item" onclick="editHeaderField(this, 'company.techStack', '${accountName}')">
                            <span class="header-label">Tech Stack</span>
                            <span class="header-value">${accountData.company.techStack}</span>
                        </div>
                    </div>

                    <div class="section">
                        <div class="section-title" onclick="editSectionTitle(this, 'Key Contacts', '${accountName}')">Key Contacts</div>
                        <div class="contact-grid">
                            ${accountData.keyContacts.map((contact, idx) => `
                                <div class="contact-card">
                                    <div class="contact-name" onclick="editContact(${idx}, '${accountName}')">${contact.name}</div>
                                    <div class="contact-detail">Title: ${contact.title}</div>
                                    <div class="contact-status">${contact.status}</div>
                                </div>
                            `).join('')}
                        </div>
                    </div>

                    <div class="section">
                        <div class="section-title">Why Anyscale</div>
                        <div class="section-content" onclick="editListSection(this, 'whyAnyscale', '${accountName}')">
                            <ul class="bullet-list">
                                ${accountData.whyAnyscale.map((point, idx) => `
                                    <li>
                                        <span class="bullet-text" onclick="event.stopPropagation(); editBulletPoint(this, 'whyAnyscale', ${idx}, '${accountName}')">${point}</span>
                                        <span class="bullet-remove" onclick="event.stopPropagation(); removeBulletPoint('whyAnyscale', ${idx}, '${accountName}')">×</span>
                                    </li>
                                `).join('')}
                            </ul>
                        </div>
                        <div class="list-actions">
                            <button class="btn" onclick="addBulletPoint('whyAnyscale', '${accountName}')">+ Add Point</button>
                        </div>
                    </div>

                    <div class="section">
                        <div class="section-title">Ray Library Fit</div>
                        <div class="section-content" onclick="editListSection(this, 'rayLibraries', '${accountName}')">
                            <ul class="bullet-list">
                                ${accountData.rayLibraries.map((lib, idx) => `
                                    <li>
                                        <span class="bullet-text" onclick="event.stopPropagation(); editBulletPoint(this, 'rayLibraries', ${idx}, '${accountName}')">${lib}</span>
                                        <span class="bullet-remove" onclick="event.stopPropagation(); removeBulletPoint('rayLibraries', ${idx}, '${accountName}')">×</span>
                                    </li>
                                `).join('')}
                            </ul>
                        </div>
                        <div class="list-actions">
                            <button class="btn" onclick="addBulletPoint('rayLibraries', '${accountName}')">+ Add Library</button>
                        </div>
                    </div>

                    <div class="section">
                        <div class="section-title">Relevant Proof Points</div>
                        <div class="section-content" onclick="editListSection(this, 'proofPoints', '${accountName}')">
                            <ul class="bullet-list">
                                ${accountData.proofPoints.map((proof, idx) => `
                                    <li>
                                        <span class="bullet-text" onclick="event.stopPropagation(); editBulletPoint(this, 'proofPoints', ${idx}, '${accountName}')">${proof}</span>
                                        <span class="bullet-remove" onclick="event.stopPropagation(); removeBulletPoint('proofPoints', ${idx}, '${accountName}')">×</span>
                                    </li>
                                `).join('')}
                            </ul>
                        </div>
                        <div class="list-actions">
                            <button class="btn" onclick="addBulletPoint('proofPoints', '${accountName}')">+ Add Proof Point</button>
                        </div>
                    </div>

                    <div class="section">
                        <div class="section-title">Discovery Questions</div>
                        <div class="section-content" onclick="editListSection(this, 'discoveryQuestions', '${accountName}')">
                            <ul class="bullet-list">
                                ${accountData.discoveryQuestions.map((q, idx) => `
                                    <li>
                                        <span class="bullet-text" onclick="event.stopPropagation(); editBulletPoint(this, 'discoveryQuestions', ${idx}, '${accountName}')">${q}</span>
                                        <span class="bullet-remove" onclick="event.stopPropagation(); removeBulletPoint('discoveryQuestions', ${idx}, '${accountName}')">×</span>
                                    </li>
                                `).join('')}
                            </ul>
                        </div>
                        <div class="list-actions">
                            <button class="btn" onclick="addBulletPoint('discoveryQuestions', '${accountName}')">+ Add Question</button>
                        </div>
                    </div>

                    <div class="section">
                        <div class="section-title">Objection Handling</div>
                        ${accountData.objections.map((obj, idx) => `
                            <div class="objection-item" onclick="editObjection(${idx}, '${accountName}')">
                                <div class="objection-label">Objection</div>
                                <div class="objection-text">${obj.objection}</div>
                                <div class="objection-label" style="margin-top: 12px;">Response</div>
                                <div class="objection-text">${obj.response}</div>
                            </div>
                        `).join('')}
                        <div class="list-actions">
                            <button class="btn" onclick="addObjection('${accountName}')">+ Add Objection</button>
                        </div>
                    </div>

                    <div class="section">
                        <div class="section-title">30-Minute Meeting Agenda</div>
                        ${accountData.agenda.map((item, idx) => `
                            <div class="agenda-item" onclick="editAgendaItem(${idx}, '${accountName}')">
                                <div class="agenda-time">${item.time}</div>
                                <div class="agenda-topic">${item.topic}</div>
                            </div>
                        `).join('')}
                        <div class="list-actions">
                            <button class="btn" onclick="addAgendaItem('${accountName}')">+ Add Agenda Item</button>
                        </div>
                    </div>

                    <div class="custom-notes">
                        <label class="custom-notes-label">Custom Call Notes</label>
                        <textarea placeholder="Add your own notes for this account..." onchange="saveCustomNotes(this, '${accountName}')">${accountData.customNotes || ''}</textarea>
                    </div>

                    <div class="copy-button-container">
                        <button class="copy-button" onclick="copyToClipboard('${accountName}')">
                            📋 Copy All to Clipboard
                        </button>
                        <div class="copy-feedback" id="copyFeedback">
                            ✓ Prep briefing copied to clipboard!
                        </div>
                    </div>
                </div>
            `;

            prepContent.innerHTML = html;
            noSelection.classList.remove('active');
            prepContent.classList.add('active');
        }

        function editHeaderField(element, field, accountName) {
            if (element.querySelector('input')) return;

            const value = element.querySelector('.header-value').textContent;
            element.classList.add('editing');

            const input = document.createElement('input');
            input.type = 'text';
            input.value = value;

            const headerValue = element.querySelector('.header-value');
            const parent = headerValue.parentElement;
            parent.replaceChild(input, headerValue);

            input.focus();
            input.select();

            const save = () => {
                const newValue = input.value;
                const parts = field.split('.');
                let obj = accounts[accountName];
                for (let i = 0; i < parts.length - 1; i++) {
                    obj = obj[parts[i]];
                }
                obj[parts[parts.length - 1]] = newValue;
                saveToStorage();
                renderPrepContent(accountName);
            };

            input.addEventListener('blur', save);
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') save();
                if (e.key === 'Escape') renderPrepContent(accountName);
            });
        }

        function editContact(contactIdx, accountName) {
            const contact = accounts[accountName].keyContacts[contactIdx];
            const newName = prompt('Edit contact name:', contact.name);
            if (newName !== null) {
                contact.name = newName;
                saveToStorage();
                renderPrepContent(accountName);
            }
        }

        function editBulletPoint(element, field, idx, accountName) {
            if (element.querySelector('input')) return;

            const value = element.textContent;
            element.classList.add('editing');

            const input = document.createElement('input');
            input.type = 'text';
            input.value = value;

            element.textContent = '';
            element.appendChild(input);

            input.focus();
            input.select();

            const save = () => {
                accounts[accountName][field][idx] = input.value;
                saveToStorage();
                renderPrepContent(accountName);
            };

            input.addEventListener('blur', save);
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') save();
                if (e.key === 'Escape') renderPrepContent(accountName);
            });
        }

        function removeBulletPoint(field, idx, accountName) {
            accounts[accountName][field].splice(idx, 1);
            saveToStorage();
            renderPrepContent(accountName);
        }

        function addBulletPoint(field, accountName) {
            const newPoint = prompt('Add new point:');
            if (newPoint !== null && newPoint.trim()) {
                accounts[accountName][field].push(newPoint);
                saveToStorage();
                renderPrepContent(accountName);
            }
        }

        function editObjection(idx, accountName) {
            const obj = accounts[accountName].objections[idx];
            const newObjection = prompt('Edit objection:', obj.objection);
            if (newObjection !== null) {
                obj.objection = newObjection;
                const newResponse = prompt('Edit response:', obj.response);
                if (newResponse !== null) {
                    obj.response = newResponse;
                    saveToStorage();
                    renderPrepContent(accountName);
                }
            }
        }

        function addObjection(accountName) {
            const objection = prompt('Add new objection:');
            if (objection !== null && objection.trim()) {
                const response = prompt('Add response to objection:');
                if (response !== null && response.trim()) {
                    accounts[accountName].objections.push({
                        objection: objection,
                        response: response
                    });
                    saveToStorage();
                    renderPrepContent(accountName);
                }
            }
        }

        function editAgendaItem(idx, accountName) {
            const item = accounts[accountName].agenda[idx];
            const newTime = prompt('Edit time slot:', item.time);
            if (newTime !== null) {
                item.time = newTime;
                const newTopic = prompt('Edit topic:', item.topic);
                if (newTopic !== null) {
                    item.topic = newTopic;
                    saveToStorage();
                    renderPrepContent(accountName);
                }
            }
        }

        function addAgendaItem(accountName) {
            const time = prompt('Add time slot (e.g., 0:00-5:00):');
            if (time !== null && time.trim()) {
                const topic = prompt('Add topic:');
                if (topic !== null && topic.trim()) {
                    accounts[accountName].agenda.push({
                        time: time,
                        topic: topic
                    });
                    saveToStorage();
                    renderPrepContent(accountName);
                }
            }
        }

        function saveCustomNotes(textarea, accountName) {
            accounts[accountName].customNotes = textarea.value;
            saveToStorage();
        }

        function editListSection(element, field, accountName) {
            // This allows clicking on the entire section to edit
        }

        function editSectionTitle(element, title, accountName) {
            // Section titles are read-only in this version
        }

        function showAddAccountForm() {
            const accountName = prompt('Enter new account name:');
            if (accountName && accountName.trim()) {
                if (accounts[accountName]) {
                    alert('Account already exists!');
                    return;
                }

                const newAccount = {
                    company: {
                        industry: '',
                        size: '',
                        hq: '',
                        funding: '',
                        techStack: ''
                    },
                    keyContacts: [{ name: '', title: '', status: 'New' }],
                    whyAnyscale: [''],
                    rayLibraries: [''],
                    proofPoints: [''],
                    discoveryQuestions: [''],
                    objections: [{ objection: '', response: '' }],
                    agenda: [
                        { time: '0:00-5:00', topic: 'Warm-up & Context' },
                        { time: '5:00-25:00', topic: 'Main Discussion' },
                        { time: '25:00-30:00', topic: 'Next Steps' }
                    ],
                    customNotes: ''
                };

                accounts[accountName] = newAccount;
                saveToStorage();
                selectAccount(accountName);
            }
        }

        function resetToDefaults() {
            if (confirm('Reset all accounts to default data? This will erase any custom changes.')) {
                accounts = { ...defaultAccounts };
                saveToStorage();
                document.getElementById('accountInput').value = '';
                document.getElementById('prepContent').innerHTML = '';
                document.getElementById('noSelection').classList.add('active');
                document.getElementById('prepContent').classList.remove('active');
            }
        }

        function copyToClipboard(accountName) {
            const accountData = accounts[accountName];

            let text = `CALL PREP BRIEFING: ${accountName}\n`;
            text += '='.repeat(50) + '\n\n';

            text += 'COMPANY OVERVIEW\n';
            text += '-'.repeat(30) + '\n';
            text += `Industry: ${accountData.company.industry}\n`;
            text += `Size: ${accountData.company.size}\n`;
            text += `Headquarters: ${accountData.company.hq}\n`;
            text += `Funding: ${accountData.company.funding}\n`;
            text += `Tech Stack: ${accountData.company.techStack}\n\n`;

            text += 'KEY CONTACTS\n';
            text += '-'.repeat(30) + '\n';
            accountData.keyContacts.forEach(contact => {
                text += `• ${contact.name}\n  Title: ${contact.title}\n  Status: ${contact.status}\n\n`;
            });

            text += 'WHY ANYSCALE\n';
            text += '-'.repeat(30) + '\n';
            accountData.whyAnyscale.forEach((point, i) => {
                text += `${i + 1}. ${point}\n\n`;
            });

            text += 'RAY LIBRARY FIT\n';
            text += '-'.repeat(30) + '\n';
            accountData.rayLibraries.forEach(lib => {
                text += `• ${lib}\n`;
            });
            text += '\n';

            text += 'RELEVANT PROOF POINTS\n';
            text += '-'.repeat(30) + '\n';
            accountData.proofPoints.forEach(proof => {
                text += `• ${proof}\n`;
            });
            text += '\n';

            text += 'DISCOVERY QUESTIONS\n';
            text += '-'.repeat(30) + '\n';
            accountData.discoveryQuestions.forEach((q, i) => {
                text += `${i + 1}. ${q}\n`;
            });
            text += '\n';

            text += 'OBJECTION HANDLING\n';
            text += '-'.repeat(30) + '\n';
            accountData.objections.forEach((obj, i) => {
                text += `${i + 1}. Objection: ${obj.objection}\n   Response: ${obj.response}\n\n`;
            });

            text += '30-MINUTE MEETING AGENDA\n';
            text += '-'.repeat(30) + '\n';
            accountData.agenda.forEach(item => {
                text += `${item.time}: ${item.topic}\n`;
            });

            if (accountData.customNotes) {
                text += '\nCUSTOM NOTES\n';
                text += '-'.repeat(30) + '\n';
                text += accountData.customNotes + '\n';
            }

            navigator.clipboard.writeText(text).then(() => {
                const feedback = document.getElementById('copyFeedback');
                feedback.classList.add('show');
                setTimeout(() => {
                    feedback.classList.remove('show');
                }, 2000);
            });
        }

        // Initialize on load
        init();
    </script>
</body>
