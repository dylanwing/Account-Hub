        .btn:hover {

        .btn-primary {

        }

        }

        }

            color: #f0f4ff;
            font-size: 14px;

            transition: background-color 0.2s ease;

        .suggestion-item:hover {
            background-color: #252f42;
        }

        }

            margin-bottom: 12px;
            position: relative;
            font-size: 14px;
            line-height: 1.7;
            display: flex;
            align-items: center;

            color: #3b82f6;
            font-weight: bold;
            font-size: 18px;

            background-color: rgba(59, 130, 246, 0.1);

            padding: 4px 8px;

            color: #f0f4ff;

            .company-header {

            }

                grid-template-columns: 1fr;
            }

            .selector-section {
                flex-direction: column;
            }
        }

        // Initialize
        function init() {
            loadFromStorage();
            setupEventListeners();
        }

        function loadFromStorage() {
            const stored = localStorage.getItem(STORAGE_KEY);
            if (stored) {
                try {
                    accounts = JSON.parse(stored);
                } catch (e) {
                    accounts = { ...defaultAccounts };
                }
            } else {
                accounts = { ...defaultAccounts };
            }
        }

        function saveToStorage() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(accounts));
        }

        function setupEventListeners() {
            const input = document.getElementById('accountInput');
            const suggestions = document.getElementById('suggestions');

            input.addEventListener('input', (e) => {
                const value = e.target.value.trim().toLowerCase();
                suggestions.innerHTML = '';

                if (!value) {
                    suggestions.classList.remove('show');
                    return;
                }

                const matches = Object.keys(accounts).filter(name =>
                    name.toLowerCase().includes(value)
                );

                if (matches.length === 0) {
                    suggestions.classList.remove('show');
                    return;
                }

                matches.forEach(match => {
                    const div = document.createElement('div');
                    div.className = 'suggestion-item';
                    div.textContent = match;
                    div.onclick = () => selectAccount(match);
                    suggestions.appendChild(div);
                });

                suggestions.classList.add('show');
            });

            document.addEventListener('click', (e) => {
                if (!e.target.closest('.search-container')) {
                    suggestions.classList.remove('show');
                }
            });
        }

        function selectAccount(accountName) {
            const input = document.getElementById('accountInput');
            input.value = accountName;
            document.getElementById('suggestions').classList.remove('show');
            renderPrepContent(accountName);
        }

                                    <div class="contact-status">${contact.status}</div>
                                </div>
                            `).join('')}
                        </div>
                    </div>

                    <div class="section">
                        <div class="section-title">Why Anyscale</div>
                        <div class="section-content" onclick="editListSection(this, 'whyAnyscale', '${accountName}')">
                            <ul class="bullet-list">
                                ${accountData.whyAnyscale.map((point, idx) => `
                                    <li>
                                        <span class="bullet-text" onclick="event.stopPropagation(); editBulletPoint(this, 'whyAnyscale', ${idx}, '${accountName}')">${point}</span>
                                        <span class="bullet-remove" onclick="event.stopPropagation(); removeBulletPoint('whyAnyscale', ${idx}, '${accountName}')">×</span>
                                    </li>
                                `).join('')}
                            </ul>
                        </div>
                        <div class="list-actions">
                            <button class="btn" onclick="addBulletPoint('whyAnyscale', '${accountName}')">+ Add Point</button>
                        </div>
                    </div>

                    <div class="section">
                        <div class="section-title">Ray Library Fit</div>
                        <div class="section-content" onclick="editListSection(this, 'rayLibraries', '${accountName}')">
                            <ul class="bullet-list">
                                ${accountData.rayLibraries.map((lib, idx) => `
                                    <li>
                                        <span class="bullet-text" onclick="event.stopPropagation(); editBulletPoint(this, 'rayLibraries', ${idx}, '${accountName}')">${lib}</span>
                                        <span class="bullet-remove" onclick="event.stopPropagation(); removeBulletPoint('rayLibraries', ${idx}, '${accountName}')">×</span>
                                    </li>
                                `).join('')}
                            </ul>
                        </div>
                        <div class="list-actions">
                            <button class="btn" onclick="addBulletPoint('rayLibraries', '${accountName}')">+ Add Library</button>
                        </div>
                    </div>

                    <div class="section">
                        <div class="section-title">Relevant Proof Points</div>
                        <div class="section-content" onclick="editListSection(this, 'proofPoints', '${accountName}')">
                            <ul class="bullet-list">
                                ${accountData.proofPoints.map((proof, idx) => `
                                    <li>
                                        <span class="bullet-text" onclick="event.stopPropagation(); editBulletPoint(this, 'proofPoints', ${idx}, '${accountName}')">${proof}</span>
                                        <span class="bullet-remove" onclick="event.stopPropagation(); removeBulletPoint('proofPoints', ${idx}, '${accountName}')">×</span>
                                    </li>
                                `).join('')}
                            </ul>
                        </div>
                        <div class="list-actions">
                            <button class="btn" onclick="addBulletPoint('proofPoints', '${accountName}')">+ Add Proof Point</button>
                        </div>
                    </div>

                    <div class="section">
                        <div class="section-title">Discovery Questions</div>
                        <div class="section-content" onclick="editListSection(this, 'discoveryQuestions', '${accountName}')">
                            <ul class="bullet-list">
                                ${accountData.discoveryQuestions.map((q, idx) => `
                                    <li>
                                        <span class="bullet-text" onclick="event.stopPropagation(); editBulletPoint(this, 'discoveryQuestions', ${idx}, '${accountName}')">${q}</span>
                                        <span class="bullet-remove" onclick="event.stopPropagation(); removeBulletPoint('discoveryQuestions', ${idx}, '${accountName}')">×</span>
                                    </li>
                                `).join('')}
                            </ul>
                        </div>
                        <div class="list-actions">
                            <button class="btn" onclick="addBulletPoint('discoveryQuestions', '${accountName}')">+ Add Question</button>
                        </div>
                    </div>

                    <div class="section">
                        <div class="section-title">Objection Handling</div>
                        ${accountData.objections.map((obj, idx) => `
                            <div class="objection-item" onclick="editObjection(${idx}, '${accountName}')">
                                <div class="objection-label">Objection</div>
                                <div class="objection-text">${obj.objection}</div>
                                <div class="objection-label" style="margin-top: 12px;">Response</div>
                                <div class="objection-text">${obj.response}</div>
                            </div>
                        `).join('')}
                        <div class="list-actions">
                            <button class="btn" onclick="addObjection('${accountName}')">+ Add Objection</button>
                        </div>
                    </div>

                    <div class="section">
                        <div class="section-title">30-Minute Meeting Agenda</div>
                        ${accountData.agenda.map((item, idx) => `
                            <div class="agenda-item" onclick="editAgendaItem(${idx}, '${accountName}')">
                                <div class="agenda-time">${item.time}</div>
                                <div class="agenda-topic">${item.topic}</div>
                            </div>
                        `).join('')}
                        <div class="list-actions">
                            <button class="btn" onclick="addAgendaItem('${accountName}')">+ Add Agenda Item</button>
                        </div>
                    </div>

                    <div class="custom-notes">
                        <label class="custom-notes-label">Custom Call Notes</label>
                        <textarea placeholder="Add your own notes for this account..." onchange="saveCustomNotes(this, '${accountName}')">${accountData.customNotes || ''}</textarea>
                    </div>

                    <div class="copy-button-container">
                        <button class="copy-button" onclick="copyToClipboard('${accountName}')">
                            📋 Copy All to Clipboard
                        </button>
                        <div class="copy-feedback" id="copyFeedback">
                            ✓ Prep briefing copied to clipboard!
                        </div>
                    </div>
                </div>
            `;

            prepContent.innerHTML = html;
            noSelection.classList.remove('active');
            prepContent.classList.add('active');
        }

        function editHeaderField(element, field, accountName) {
            if (element.querySelector('input')) return;

            const value = element.querySelector('.header-value').textContent;
            element.classList.add('editing');

            const input = document.createElement('input');
            input.type = 'text';
            input.value = value;

            const headerValue = element.querySelector('.header-value');
            const parent = headerValue.parentElement;
            parent.replaceChild(input, headerValue);

            input.focus();
            input.select();

            const save = () => {
                const newValue = input.value;
                const parts = field.split('.');
                let obj = accounts[accountName];
                for (let i = 0; i < parts.length - 1; i++) {
                    obj = obj[parts[i]];
                }
                obj[parts[parts.length - 1]] = newValue;
                saveToStorage();
                renderPrepContent(accountName);
            };

            input.addEventListener('blur', save);
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') save();
                if (e.key === 'Escape') renderPrepContent(accountName);
            });
        }

        function editContact(contactIdx, accountName) {
            const contact = accounts[accountName].keyContacts[contactIdx];
            const newName = prompt('Edit contact name:', contact.name);
            if (newName !== null) {
                contact.name = newName;
                saveToStorage();
                renderPrepContent(accountName);
            }
        }

        function editBulletPoint(element, field, idx, accountName) {
            if (element.querySelector('input')) return;

            const value = element.textContent;
            element.classList.add('editing');

            const input = document.createElement('input');
            input.type = 'text';
            input.value = value;

            element.textContent = '';
            element.appendChild(input);

            input.focus();
            input.select();

            const save = () => {
                accounts[accountName][field][idx] = input.value;
                saveToStorage();
                renderPrepContent(accountName);
            };

            input.addEventListener('blur', save);
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') save();
                if (e.key === 'Escape') renderPrepContent(accountName);
            });
        }

        function removeBulletPoint(field, idx, accountName) {
            accounts[accountName][field].splice(idx, 1);
            saveToStorage();
            renderPrepContent(accountName);
        }

        function addBulletPoint(field, accountName) {
            const newPoint = prompt('Add new point:');
            if (newPoint !== null && newPoint.trim()) {
                accounts[accountName][field].push(newPoint);
                saveToStorage();
                renderPrepContent(accountName);
            }
        }

        function editObjection(idx, accountName) {
            const obj = accounts[accountName].objections[idx];
            const newObjection = prompt('Edit objection:', obj.objection);
            if (newObjection !== null) {
                obj.objection = newObjection;
                const newResponse = prompt('Edit response:', obj.response);
                if (newResponse !== null) {
                    obj.response = newResponse;
                    saveToStorage();
                    renderPrepContent(accountName);
                }
            }
        }

        function addObjection(accountName) {
            const objection = prompt('Add new objection:');
            if (objection !== null && objection.trim()) {
                const response = prompt('Add response to objection:');
                if (response !== null && response.trim()) {
                    accounts[accountName].objections.push({
                        objection: objection,
                        response: response
                    });
                    saveToStorage();
                    renderPrepContent(accountName);
                }
            }
        }

        function editAgendaItem(idx, accountName) {
            const item = accounts[accountName].agenda[idx];
            const newTime = prompt('Edit time slot:', item.time);
            if (newTime !== null) {
                item.time = newTime;
                const newTopic = prompt('Edit topic:', item.topic);
                if (newTopic !== null) {
                    item.topic = newTopic;
                    saveToStorage();
                    renderPrepContent(accountName);
                }
            }
        }

        function addAgendaItem(accountName) {
            const time = prompt('Add time slot (e.g., 0:00-5:00):');
            if (time !== null && time.trim()) {
                const topic = prompt('Add topic:');
                if (topic !== null && topic.trim()) {
                    accounts[accountName].agenda.push({
                        time: time,
                        topic: topic
                    });
                    saveToStorage();
                    renderPrepContent(accountName);
                }
            }
        }

        function saveCustomNotes(textarea, accountName) {
            accounts[accountName].customNotes = textarea.value;
            saveToStorage();
        }

        function editListSection(element, field, accountName) {
            // This allows clicking on the entire section to edit
        }

        function editSectionTitle(element, title, accountName) {
            // Section titles are read-only in this version
        }

        function showAddAccountForm() {
            const accountName = prompt('Enter new account name:');
            if (accountName && accountName.trim()) {
                if (accounts[accountName]) {
                    alert('Account already exists!');
                    return;
                }

                const newAccount = {
                    company: {
                        industry: '',
                        size: '',
                        hq: '',
                        funding: '',
                        techStack: ''
                    },
                    keyContacts: [{ name: '', title: '', status: 'New' }],
                    whyAnyscale: [''],
                    rayLibraries: [''],
                    proofPoints: [''],
                    discoveryQuestions: [''],
                    objections: [{ objection: '', response: '' }],
                    agenda: [
                        { time: '0:00-5:00', topic: 'Warm-up & Context' },
                        { time: '5:00-25:00', topic: 'Main Discussion' },
                        { time: '25:00-30:00', topic: 'Next Steps' }
                    ],
                    customNotes: ''
                };

                accounts[accountName] = newAccount;
                saveToStorage();
                selectAccount(accountName);
            }
        }

        function resetToDefaults() {
            if (confirm('Reset all accounts to default data? This will erase any custom changes.')) {
                accounts = { ...defaultAccounts };
                saveToStorage();
                document.getElementById('accountInput').value = '';
                document.getElementById('prepContent').innerHTML = '';
                document.getElementById('noSelection').classList.add('active');
                document.getElementById('prepContent').classList.remove('active');
            }
        }

        function copyToClipboard(accountName) {
            const accountData = accounts[accountName];

            let text = `CALL PREP BRIEFING: ${accountName}\n`;
            text += '='.repeat(50) + '\n\n';

            text += 'COMPANY OVERVIEW\n';
            text += '-'.repeat(30) + '\n';
            text += `Industry: ${accountData.company.industry}\n`;
            text += `Size: ${accountData.company.size}\n`;
            text += `Headquarters: ${accountData.company.hq}\n`;
            text += `Funding: ${accountData.company.funding}\n`;
            text += `Tech Stack: ${accountData.company.techStack}\n\n`;

            text += 'KEY CONTACTS\n';
            text += '-'.repeat(30) + '\n';
            accountData.keyContacts.forEach(contact => {
                text += `• ${contact.name}\n  Title: ${contact.title}\n  Status: ${contact.status}\n\n`;
            });

            text += 'WHY ANYSCALE\n';
            text += '-'.repeat(30) + '\n';
            accountData.whyAnyscale.forEach((point, i) => {
                text += `${i + 1}. ${point}\n\n`;
            });

            text += 'RAY LIBRARY FIT\n';
            text += '-'.repeat(30) + '\n';
            accountData.rayLibraries.forEach(lib => {
                text += `• ${lib}\n`;
            });
            text += '\n';

            text += 'RELEVANT PROOF POINTS\n';
            text += '-'.repeat(30) + '\n';
            accountData.proofPoints.forEach(proof => {
                text += `• ${proof}\n`;
            });
            text += '\n';

            text += 'DISCOVERY QUESTIONS\n';
            text += '-'.repeat(30) + '\n';
            accountData.discoveryQuestions.forEach((q, i) => {
                text += `${i + 1}. ${q}\n`;
            });
            text += '\n';

            text += 'OBJECTION HANDLING\n';
            text += '-'.repeat(30) + '\n';
            accountData.objections.forEach((obj, i) => {
                text += `${i + 1}. Objection: ${obj.objection}\n   Response: ${obj.response}\n\n`;
            });

            text += '30-MINUTE MEETING AGENDA\n';
            text += '-'.repeat(30) + '\n';
            accountData.agenda.forEach(item => {
                text += `${item.time}: ${item.topic}\n`;
            });

            if (accountData.customNotes) {
                text += '\nCUSTOM NOTES\n';
                text += '-'.repeat(30) + '\n';
                text += accountData.customNotes + '\n';
            }

            navigator.clipboard.writeText(text).then(() => {
                const feedback = document.getElementById('copyFeedback');
                feedback.classList.add('show');
                setTimeout(() => {
                    feedback.classList.remove('show');
                }, 2000);
            });
        }

        // Initialize on load
        init();
    </script>
</body>
