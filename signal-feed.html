<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signal Feed - Anyscale Account Planning Hub</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0b0f1a;
            color: #f0f4ff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            margin-bottom: 40px;
        }

        h1 {
            font-size: 32px;
            margin-bottom: 8px;
            font-weight: 700;
        }

        .subtitle {
            color: #a0acd0;
            font-size: 14px;
        }

        .filters-section {
            background-color: #1a2235;
            border: 1px solid #1e2d42;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 30px;
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            align-items: center;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .filter-label {
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            color: #7a8ab3;
            letter-spacing: 0.5px;
        }

        .filter-select, .search-input {
            background-color: #0b0f1a;
            border: 1px solid #1e2d42;
            color: #f0f4ff;
            padding: 10px 12px;
            border-radius: 8px;
            font-size: 13px;
            font-family: inherit;
            min-width: 120px;
            transition: all 0.3s ease;
        }

        .filter-select:hover, .search-input:hover {
            border-color: #3b82f6;
        }

        .filter-select:focus, .search-input:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .search-input {
            min-width: 250px;
            flex: 1;
        }

        .signal-container {
            display: grid;
            gap: 16px;
        }

        .signal-card {
            background-color: #1a2235;
            border: 1px solid #1e2d42;
            border-radius: 12px;
            padding: 20px;
            transition: all 0.3s ease;
            cursor: pointer;
            display: flex;
            gap: 16px;
        }

        .signal-card:hover {
            border-color: #3b82f6;
            box-shadow: 0 8px 24px rgba(59, 130, 246, 0.1);
            transform: translateY(-2px);
        }

        .signal-icon {
            font-size: 24px;
            min-width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: rgba(59, 130, 246, 0.1);
            border-radius: 8px;
        }

        .signal-content {
            flex: 1;
        }

        .signal-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 8px;
            flex-wrap: wrap;
        }

        .company-name {
            font-size: 16px;
            font-weight: 600;
            color: #f0f4ff;
        }

        .tier-badge {
            font-size: 11px;
            font-weight: 700;
            padding: 4px 10px;
            border-radius: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .tier-1 {
            background-color: rgba(236, 72, 153, 0.15);
            color: #ff6b9d;
        }

        .tier-2 {
            background-color: rgba(59, 130, 246, 0.15);
            color: #60a5fa;
        }

        .tier-3 {
            background-color: rgba(34, 197, 94, 0.15);
            color: #86efac;
        }

        .tier-4 {
            background-color: rgba(168, 85, 247, 0.15);
            color: #d8b4fe;
        }

        .signal-timestamp {
            font-size: 12px;
            color: #7a8ab3;
            margin-left: auto;
        }

        .signal-description {
            font-size: 14px;
            color: #d1d8e8;
            line-height: 1.5;
            margin-bottom: 12px;
        }

        .signal-footer {
            display: flex;
            gap: 16px;
            align-items: center;
            flex-wrap: wrap;
        }

        .relevance-badge {
            font-size: 11px;
            font-weight: 700;
            padding: 4px 12px;
            border-radius: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .relevance-high {
            background-color: rgba(16, 185, 129, 0.15);
            color: #6ee7b7;
        }

        .relevance-medium {
            background-color: rgba(251, 146, 60, 0.15);
            color: #fdba74;
        }

        .relevance-low {
            background-color: rgba(107, 114, 128, 0.15);
            color: #d1d5db;
        }

        .signal-type {
            font-size: 12px;
            color: #a0acd0;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 600;
        }

        .stats-section {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .stat-card {
            background-color: #1a2235;
            border: 1px solid #1e2d42;
            border-radius: 12px;
            padding: 16px 24px;
            flex: 1;
            min-width: 150px;
        }

        .stat-value {
            font-size: 28px;
            font-weight: 700;
            color: #3b82f6;
            margin-bottom: 4px;
        }

        .stat-label {
            font-size: 12px;
            color: #7a8ab3;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #7a8ab3;
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        @media (max-width: 768px) {
            .filters-section {
                flex-direction: column;
                align-items: stretch;
            }

            .filter-select, .search-input {
                min-width: unset;
            }

            .signal-card {
                flex-direction: column;
            }

            .signal-header {
                justify-content: space-between;
            }

            .signal-timestamp {
                margin-left: 0;
            }

            h1 {
                font-size: 24px;
            }
        }
    </style>
</head>

        <div class="signal-container" id="signals-container">

        function renderSignals(filteredSignals) {
            const container = document.getElementById('signals-container');
            const emptyState = document.getElementById('empty-state');

            if (filteredSignals.length === 0) {
                container.innerHTML = '';
                emptyState.style.display = 'block';
                return;
            }

            emptyState.style.display = 'none';
            container.innerHTML = filteredSignals.map(signal => `
                <div class="signal-card" data-type="${signal.type}" data-tier="${signal.tier}" data-relevance="${signal.relevance}">
                    <div class="signal-icon">${signal.icon}</div>
                    <div class="signal-content">
                        <div class="signal-header">
                            <span class="company-name">${signal.company}</span>
                            <span class="tier-badge ${signal.tier}">${signal.tier.toUpperCase()}</span>
                            <span class="signal-timestamp">${signal.timestamp}</span>
                        </div>
                        <div class="signal-description">${signal.description}</div>
                        <div class="signal-footer">
                            <span class="signal-type">${signal.typeLabel}</span>
                            <span class="relevance-badge relevance-${signal.relevance}">Relevance: ${signal.relevance}</span>
                        </div>
                    </div>
                </div>
            `).join('');

            updateStats(filteredSignals);
        }

        function updateStats(filteredSignals) {
            const highRelevance = filteredSignals.filter(s => s.relevance === 'high').length;
            const tier1 = filteredSignals.filter(s => s.tier === 'tier-1').length;
            document.getElementById('total-signals').textContent = filteredSignals.length;
            document.getElementById('high-relevance').textContent = highRelevance;
            document.getElementById('tier-1-count').textContent = tier1;
        }

        function getFilteredSignals() {
            const typeFilter = document.getElementById('type-filter').value;
            const tierFilter = document.getElementById('tier-filter').value;
            const relevanceFilter = document.getElementById('relevance-filter').value;
            const searchTerm = document.getElementById('search-input').value.toLowerCase();

            return signals.filter(signal => {
                const matchesType = !typeFilter || signal.type === typeFilter;
                const matchesTier = !tierFilter || signal.tier === tierFilter;
                const matchesRelevance = !relevanceFilter || signal.relevance === relevanceFilter;
                const matchesSearch = !searchTerm ||
                    signal.company.toLowerCase().includes(searchTerm) ||
                    signal.description.toLowerCase().includes(searchTerm);

                return matchesType && matchesTier && matchesRelevance && matchesSearch;
            });
        }

        function applyFilters() {
            const filtered = getFilteredSignals();
            renderSignals(filtered);
        }

        // Event listeners
        document.getElementById('type-filter').addEventListener('change', applyFilters);
        document.getElementById('tier-filter').addEventListener('change', applyFilters);
        document.getElementById('relevance-filter').addEventListener('change', applyFilters);
        document.getElementById('search-input').addEventListener('input', applyFilters);

        // Initial render
        renderSignals(signals);
